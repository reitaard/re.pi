name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string
      source_ref:
        description: 'Source ref to build/publish (defaults to tag; use only for release recovery)'
        required: false
        type: string

permissions: {}

concurrency:
  group: build-binaries-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Keep GitHub Release mutation behind the release-preview environment. The
  # build job writes the exact notes to its summary before approval is requested.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '26.4.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Prepare GitHub release payload
        run: |
          set -euo pipefail

          mkdir -p release-assets

          test -s .github/RELEASE_NOTES.md
          cp .github/RELEASE_NOTES.md release-assets/RELEASE_NOTES.md
          git archive --format=tar --prefix=recode-source/ "${SOURCE_REF}" | gzip -n > release-assets/recode-source.tar.gz
          node scripts/generate-coding-agent-install-lock.mjs --check
          cd packages/coding-agent/binaries

          binary_assets=(
            recode-linux-x64.tar.gz
            recode-linux-arm64.tar.gz
            recode-windows-x64.zip
            recode-windows-arm64.zip
            recode-termux-node.tar.gz
          )

          for asset in "${binary_assets[@]}"; do
            test -f "${asset}"
          done

          cp "${binary_assets[@]}" "${GITHUB_WORKSPACE}/release-assets/"

          cd "${GITHUB_WORKSPACE}/release-assets"
          release_assets=(
            recode-linux-x64.tar.gz
            recode-linux-arm64.tar.gz
            recode-windows-x64.zip
            recode-windows-arm64.zip
            recode-termux-node.tar.gz
            recode-source.tar.gz
          )
          sha256sum "${release_assets[@]}" > SHA256SUMS

      - name: Show release notes preview
        run: |
          {
            echo "# Recode ${RELEASE_TAG} release preview"
            echo
            cat release-assets/RELEASE_NOTES.md
            echo
            echo "## Assets"
            sed 's/^/- `/' release-assets/SHA256SUMS | sed 's/$/`/'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload GitHub release payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  approve-release-preview:
    runs-on: ubuntu-latest
    needs: build
    environment: release-preview
    steps:
      - name: Confirm approved release preview
        run: echo "Release notes and asset checksums were approved."

  stage-github-release:
    runs-on: ubuntu-latest
    needs:
      - build
      - approve-release-preview
    permissions:
      actions: read
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download GitHub release payload
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets-${{ env.RELEASE_TAG }}
          path: release-assets

      - name: Validate GitHub release payload
        run: |
          set -euo pipefail

          cd release-assets

          expected_assets=(
            recode-linux-x64.tar.gz
            recode-linux-arm64.tar.gz
            recode-windows-x64.zip
            recode-windows-arm64.zip
            recode-termux-node.tar.gz
            recode-source.tar.gz
            SHA256SUMS
            RELEASE_NOTES.md
          )

          for asset in "${expected_assets[@]}"; do
            test -f "${asset}"
          done

          sha256sum -c SHA256SUMS

      - name: Create draft GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cd release-assets

          release_assets=(
            recode-linux-x64.tar.gz
            recode-linux-arm64.tar.gz
            recode-windows-x64.zip
            recode-windows-arm64.zip
            recode-termux-node.tar.gz
            recode-source.tar.gz
            SHA256SUMS
          )

          existing_release="$(gh release view "${RELEASE_TAG}" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "${existing_release}" == "false" ]]; then
            echo "::error::GitHub Release ${RELEASE_TAG} is already published. Refusing to mutate a public release."
            exit 1
          fi
          if [[ "${existing_release}" == "true" ]]; then
            gh release delete "${RELEASE_TAG}" --yes
          fi

          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --draft \
            --title "Recode ${RELEASE_TAG}" \
            --notes-file RELEASE_NOTES.md \
            "${release_assets[@]}"

          expected_asset_names="$(printf '%s\n' "${release_assets[@]}" | sort)"
          actual_asset_names="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | sort)"

          if [[ "${actual_asset_names}" != "${expected_asset_names}" ]]; then
            echo "::error::Draft GitHub Release asset set does not match expected files."
            diff -u <(printf '%s\n' "${expected_asset_names}") <(printf '%s\n' "${actual_asset_names}") || true
            exit 1
          fi

  publish-github-release:
    runs-on: ubuntu-latest
    needs: stage-github-release
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Publish staged GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          existing_release="$(gh release view "${RELEASE_TAG}" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "${existing_release}" == "" ]]; then
            echo "::error::Draft GitHub Release ${RELEASE_TAG} does not exist."
            exit 1
          fi
          if [[ "${existing_release}" == "false" ]]; then
            echo "::error::GitHub Release ${RELEASE_TAG} is already published."
            exit 1
          fi

          gh release edit "${RELEASE_TAG}" --draft=false

  cleanup-draft-github-release:
    runs-on: ubuntu-latest
    needs:
      - build
      - approve-release-preview
      - stage-github-release
      - publish-github-release
    if: ${{ always() && needs.stage-github-release.result != 'skipped' && (needs.stage-github-release.result != 'success' || needs.publish-github-release.result != 'success') }}
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Delete draft GitHub Release after failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          existing_release="$(gh release view "${RELEASE_TAG}" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "${existing_release}" == "true" ]]; then
            gh release delete "${RELEASE_TAG}" --yes
          fi
